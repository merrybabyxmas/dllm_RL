# Baseline DiffuGRPO configuration (no confidence credit assignment)
# Mirrors the d1/diffu-grpo official config exactly for fair comparison.

project:
  name: confidence_credit_dllm_rl
  output_dir: outputs/baseline_diffu_grpo
  seed: 1

model:
  name_or_path: MDLM-hf/LLaDA-8B-Instruct
  precision: bf16
  max_length: 512

dataset:
  name: gsm8k
  max_train_examples: null
  max_eval_examples: 256

sampling:
  group_size: 8
  max_new_tokens: 256
  diffusion_steps: 64
  temperature: 0.0
  mask_schedule: low_confidence
  block_length: 64

reward:
  type: exact_match

# No confidence credit (uniform weights)
credit:
  alpha: 0.0
  eps: 0.0
  clip_min: 1.0
  clip_max: 1.0
  normalize_within_trajectory: false

grpo:
  reward_norm: group_zscore
  reward_eps: 1.0e-6

loss:
  ppo_clip: 0.2
  kl_beta: 0.01
  max_grad_norm: 1.0

optimizer:
  policy_lr: 1.0e-6
  warmup_steps: 50

train:
  algorithm: diffu_grpo
  batch_prompts: 1
  num_generations: 8
  max_steps: 3000
  log_every: 10
  eval_every: 100
  save_every: 500
